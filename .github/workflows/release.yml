name: NuGet Release

on:
  workflow_call:
    inputs:
      project:
        description: Path to the project (.csproj)
        required: true
        type: string

      dotnet-version:
        description: .NET SDK version
        required: false
        default: "10.0.x"
        type: string

      configuration:
        description: Build configuration
        required: false
        default: Release
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Calculate Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Restore
        run: dotnet restore ${{ inputs.project }}

      - name: Build
        run: |
          dotnet build \
            ${{ inputs.project }} \
            --configuration ${{ inputs.configuration }} \
            --no-restore \
            /p:Version=${{ steps.gitversion.outputs.SemVer }}

      - name: Pack
        run: |
          dotnet pack \
            ${{ inputs.project }} \
            --configuration ${{ inputs.configuration }} \
            --no-build \
            --output ./artifacts \
            /p:PackageVersion=${{ steps.gitversion.outputs.SemVer }}

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      - name: Create Git tag
        run: |
          git config user.name "Pavel Buzakov"
          git config user.email "paulbuzakov@gmail.com"
          git tag -a "v${{ steps.gitversion.outputs.SemVer }}" -m "Release: ${{ steps.gitversion.outputs.SemVer }}"
          git push origin "v${{ steps.gitversion.outputs.SemVer }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
